<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Background Remover</title>
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1115814677653739"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  
      <!-- AdSense code here -->
      <ins
        class="adsbygoogle"
        style="display: block"
        data-ad-client="ca-pub-1115814677653739"
        data-ad-slot="1234567890"
        data-ad-format="auto"
      ></ins>

      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

  <body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-6 rounded-2xl shadow-lg w-[420px] text-center">
      <h1 class="text-xl font-bold mb-4">🪄 Background Remover</h1>

      <!-- Upload -->
      <input type="file" id="upload" class="mb-4" />

      <!-- Button -->
      <button
        onclick="removeBackground()"
        class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded w-full"
      >
        Remove Background
      </button>

      <!-- Result -->
      <img id="result" class="mt-4 hidden rounded-lg" />

      <!-- Download -->
      <a
        id="download"
        class="block mt-4 text-blue-600 hidden"
        download="no-bg.png"
      >
        Download Image
      </a>
    </div>

    <script>
      async function removeBackground() {
        const fileInput = document.getElementById("upload");
        const file = fileInput.files[0];

        if (!file) {
          alert("Upload an image");
          return;
        }

        const formData = new FormData();
        formData.append("image_file", file);

        const response = await fetch("https://api.remove.bg/v1.0/removebg", {
          method: "POST",
          headers: {
            "X-Api-Key": "sAxXch7zHos5JSBKCDUZyi9S",
          },
          body: formData,
        });

        if (!response.ok) {
          alert("Error removing background");
          return;
        }

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);

        const img = document.getElementById("result");
        const link = document.getElementById("download");

        img.src = url;
        img.classList.remove("hidden");

        link.href = url;
        link.classList.remove("hidden");
      }
    </script>
  </body>

  
      <!-- AdSense code here -->
      <ins
        class="adsbygoogle"
        style="display: block"
        data-ad-client="ca-pub-1115814677653739"
        data-ad-slot="1234567890"
        data-ad-format="auto"
      ></ins>

      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>
    
</html>
